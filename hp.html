<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulab Wallet | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: #eef2f0;
            padding: 20px;
        }
        .dashboard {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .top-bar {
            background: #1e3c2c;
            padding: 20px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .top-bar h2 {
            font-size: 24px;
        }
        .logout-btn {
            background: #f4b942;
            color: #1e3c2c;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .balance-card {
            background: linear-gradient(145deg, #f9e0a0, #f4b942);
            margin: 24px;
            padding: 28px;
            border-radius: 36px;
            text-align: center;
            color: #1e3c2c;
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
        }
        .balance-card h3 {
            font-size: 18px;
            letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 48px;
            font-weight: 800;
            margin: 12px 0;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 24px 24px;
            justify-content: center;
        }
        .action-btn {
            background: #2c5e3f;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            min-width: 130px;
            transition: 0.2s;
        }
        .action-btn.warning {
            background: #c0392b;
        }
        .action-btn.secondary {
            background: #2980b9;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            max-width: 400px;
            width: 90%;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }
        .modal-card input {
            width: 100%;
            margin: 12px 0;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid #ccc;
        }
        .close-modal {
            background: #aaa;
            margin-top: 8px;
        }
        .transactions {
            margin: 16px 24px 24px;
            border-top: 1px solid #e0e0e0;
            padding-top: 16px;
        }
        .transactions h4 {
            margin-bottom: 12px;
            color: #2c5e3f;
        }
        .tx-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 20px;
            margin: 8px 0;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .admin-link {
            text-align: center;
            margin: 20px 0 24px;
        }
        .admin-link a {
            background: #34495e;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="top-bar">
        <h2>🌸 Gulab Wallet</h2>
        <a href="index.html" class="logout-btn" id="logoutBtn">Logout</a>
    </div>
    <div class="balance-card">
        <h3>Your Balance</h3>
        <div class="balance-amount" id="balanceDisplay">$0.00</div>
    </div>
    <div class="actions">
        <button class="action-btn" id="depositBtn">➕ Deposit</button>
        <button class="action-btn warning" id="withdrawBtn">💸 Withdraw</button>
        <button class="action-btn secondary" id="redeemBtn">🎁 Redeem Code</button>
    </div>

    <div class="transactions">
        <h4>📜 Recent Activity</h4>
        <div id="txList">No transactions yet.</div>
    </div>
    <div class="admin-link" id="adminLinkArea" style="display:none;">
        <a href="admin.html" target="_blank">🛠️ Admin Panel</a>
    </div>
</div>

<!-- Deposit Modal -->
<div id="depositModal" class="modal">
    <div class="modal-card">
        <h3>Deposit Money</h3>
        <input type="number" id="depositAmount" placeholder="Enter amount in USD">
        <button id="confirmDeposit">Confirm Deposit</button>
        <button class="close-modal">Cancel</button>
    </div>
</div>

<!-- Withdraw Modal (wallet address + confirmation) -->
<div id="withdrawModal" class="modal">
    <div class="modal-card">
        <h3>Withdraw Funds</h3>
        <input type="text" id="withdrawWallet" placeholder="Your Crypto Wallet Address">
        <input type="number" id="withdrawAmount" placeholder="Amount to withdraw">
        <button id="confirmWithdraw">Request Withdrawal</button>
        <button class="close-modal">Cancel</button>
        <div id="withdrawMsg" style="margin-top:12px; font-size:13px;"></div>
    </div>
</div>

<!-- Redeem Code Modal -->
<div id="redeemModal" class="modal">
    <div class="modal-card">
        <h3>Redeem Promo Code</h3>
        <input type="text" id="redeemCode" placeholder="Enter redeem code">
        <button id="confirmRedeem">Redeem</button>
        <button class="close-modal">Cancel</button>
    </div>
</div>

<script>
    // ----- helpers -----
    function getUsers() {
        return JSON.parse(localStorage.getItem("gulab_users") || "[]");
    }
    function saveUsers(users) {
        localStorage.setItem("gulab_users", JSON.stringify(users));
    }
    let currentUser = null;

    function loadCurrentUser() {
        const stored = sessionStorage.getItem("gulab_logged_user");
        if (!stored) {
            window.location.href = "index.html";
            return null;
        }
        const parsed = JSON.parse(stored);
        const users = getUsers();
        const user = users.find(u => u.username === parsed.username);
        if (!user) {
            sessionStorage.removeItem("gulab_logged_user");
            window.location.href = "index.html";
            return null;
        }
        return user;
    }

    function updateUI() {
        if (!currentUser) return;
        document.getElementById("balanceDisplay").innerText = `$${currentUser.balance.toFixed(2)}`;
        // show admin link if admin
        if (currentUser.isAdmin === true) {
            document.getElementById("adminLinkArea").style.display = "block";
        } else {
            document.getElementById("adminLinkArea").style.display = "none";
        }
        renderTransactions();
    }

    function renderTransactions() {
        const txDiv = document.getElementById("txList");
        if (!currentUser.transactions || currentUser.transactions.length === 0) {
            txDiv.innerHTML = "No transactions yet.";
            return;
        }
        txDiv.innerHTML = "";
        currentUser.transactions.slice().reverse().forEach(tx => {
            const el = document.createElement("div");
            el.className = "tx-item";
            el.innerHTML = `<span>${tx.date}</span><span>${tx.desc}</span><span><b>${tx.amount}</b></span>`;
            txDiv.appendChild(el);
        });
    }

    function addTransaction(desc, amountNumFormatted) {
        if (!currentUser.transactions) currentUser.transactions = [];
        currentUser.transactions.push({
            date: new Date().toLocaleString(),
            desc: desc,
            amount: amountNumFormatted
        });
        // keep last 20
        if (currentUser.transactions.length > 20) currentUser.transactions.shift();
        saveUsers(getUsers().map(u => u.username === currentUser.username ? currentUser : u));
        updateUI();
    }

    function persistUser() {
        const users = getUsers();
        const idx = users.findIndex(u => u.username === currentUser.username);
        if (idx !== -1) users[idx] = currentUser;
        saveUsers(users);
        updateUI();
    }

    // deposit logic
    function deposit(amount) {
        if (isNaN(amount) || amount <= 0) return false;
        currentUser.balance += amount;
        addTransaction(`Deposit`, `+$${amount.toFixed(2)}`);
        persistUser();
        return true;
    }

    // withdraw request (mock payment done)
    function requestWithdrawal(wallet, amount) {
        if (isNaN(amount) || amount <= 0) return { success: false, msg: "Invalid amount" };
        if (amount > currentUser.balance) return { success: false, msg: "Insufficient balance" };
        // update wallet address
        currentUser.walletAddress = wallet;
        // deduct balance (simulate payment processing)
        currentUser.balance -= amount;
        addTransaction(`Withdrawal requested to ${wallet.substring(0,6)}...`, `-$${amount.toFixed(2)}`);
        persistUser();
        return { success: true, msg: "Payment Done ✅. You Will Receive Payment In 24 Hours" };
    }

    // redeem code logic
    function redeemCode(code) {
        const redeemCodes = JSON.parse(localStorage.getItem("gulab_redeem_codes") || "[]");
        const foundIdx = redeemCodes.findIndex(rc => rc.code === code && !rc.used);
        if (foundIdx === -1) return { success: false, msg: "Invalid or already used code." };
        const codeObj = redeemCodes[foundIdx];
        const dollarValue = codeObj.value;
        // mark as used
        redeemCodes[foundIdx].used = true;
        localStorage.setItem("gulab_redeem_codes", JSON.stringify(redeemCodes));
        // add balance
        currentUser.balance += dollarValue;
        addTransaction(`Redeemed code: ${code}`, `+$${dollarValue.toFixed(2)}`);
        persistUser();
        return { success: true, msg: `Success! +$${dollarValue.toFixed(2)} added to balance.` };
    }

    // ---- modals handling ----
    function openModal(modalId) {
        document.getElementById(modalId).style.display = "flex";
    }
    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
    }

    // event listeners
    document.getElementById("depositBtn").onclick = () => openModal("depositModal");
    document.getElementById("withdrawBtn").onclick = () => openModal("withdrawModal");
    document.getElementById("redeemBtn").onclick = () => openModal("redeemModal");

    document.getElementById("confirmDeposit").onclick = () => {
        const amount = parseFloat(document.getElementById("depositAmount").value);
        if (deposit(amount)) {
            alert(`Deposit $${amount.toFixed(2)} successful!`);
            closeModals();
            document.getElementById("depositAmount").value = "";
        } else {
            alert("Enter a valid amount > 0");
        }
    };

    document.getElementById("confirmWithdraw").onclick = () => {
        const wallet = document.getElementById("withdrawWallet").value.trim();
        const amount = parseFloat(document.getElementById("withdrawAmount").value);
        const res = requestWithdrawal(wallet, amount);
        const msgDiv = document.getElementById("withdrawMsg");
        if (res.success) {
            msgDiv.style.color = "green";
            msgDiv.innerText = res.msg;
            setTimeout(() => { closeModals(); msgDiv.innerText = ""; }, 2000);
            document.getElementById("withdrawWallet").value = "";
            document.getElementById("withdrawAmount").value = "";
        } else {
            msgDiv.style.color = "red";
            msgDiv.innerText = res.msg;
        }
    };

    document.getElementById("confirmRedeem").onclick = () => {
        const code = document.getElementById("redeemCode").value.trim();
        const res = redeemCode(code);
        alert(res.msg);
        if (res.success) {
            closeModals();
            document.getElementById("redeemCode").value = "";
        }
    };

    document.querySelectorAll(".close-modal").forEach(btn => {
        btn.onclick = closeModals;
    });

    window.onclick = (e) => {
        if (e.target.classList.contains('modal')) closeModals();
    };

    document.getElementById("logoutBtn").onclick = (e) => {
        sessionStorage.removeItem("gulab_logged_user");
        // no redirect needed, href is index.html
    };

    // init
    currentUser = loadCurrentUser();
    if (currentUser) {
        updateUI();
    }
</script>
</body>
</html>
