<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulab Admin | Create Codes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #1e2a36;
            padding: 30px;
        }
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1e3c2c;
            border-left: 8px solid #f4b942;
            padding-left: 20px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background: #f4b942;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-right: 12px;
        }
        .code-list {
            margin-top: 32px;
            border-top: 2px dashed #ddd;
            padding-top: 24px;
        }
        .code-item {
            background: #f9f9f9;
            border-radius: 20px;
            padding: 12px 20px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            background: #2c5e3f;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
        }
        .used {
            background: #aaa;
        }
        .status {
            font-size: 13px;
        }
        .warning {
            color: #c0392b;
        }
        .admin-only {
            background: #fef5e7;
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🛡️ Gulab Wallet - Admin</h1>
    <div class="admin-only" id="adminAuthMsg">🔐 Verifying admin rights...</div>

    <div id="adminContent" style="display: none;">
        <div class="form-group">
            <label>💰 Dollar Value of Redeem Code</label>
            <input type="number" id="codeValue" placeholder="e.g., 10, 25, 50" step="0.01">
        </div>
        <div class="form-group">
            <label>🎫 Custom Code (optional, leave blank for random)</label>
            <input type="text" id="customCode" placeholder="Leave empty for auto-generate">
        </div>
        <button id="createCodeBtn">✨ Generate Redeem Code</button>
        <button id="refreshListBtn">🔄 Refresh Codes</button>

        <div class="code-list">
            <h3>📋 Existing Redeem Codes</h3>
            <div id="codesContainer">Loading...</div>
        </div>
    </div>
</div>

<script>
    // admin check: only if logged user has isAdmin flag
    function getUsers() {
        return JSON.parse(localStorage.getItem("gulab_users") || "[]");
    }

    function saveUsers(users) {
        localStorage.setItem("gulab_users", JSON.stringify(users));
    }

    function getRedeemCodes() {
        return JSON.parse(localStorage.getItem("gulab_redeem_codes") || "[]");
    }

    function saveRedeemCodes(codes) {
        localStorage.setItem("gulab_redeem_codes", JSON.stringify(codes));
    }

    function generateRandomCode() {
        return "GULAB" + Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function renderCodeList() {
        const codes = getRedeemCodes();
        const container = document.getElementById("codesContainer");
        if (codes.length === 0) {
            container.innerHTML = "<p>No redeem codes created yet.</p>";
            return;
        }
        container.innerHTML = "";
        codes.forEach((codeObj, idx) => {
            const div = document.createElement("div");
            div.className = "code-item";
            const usedStatus = codeObj.used ? "❌ USED" : "✅ ACTIVE";
            const statusClass = codeObj.used ? "used" : "";
            div.innerHTML = `
                <div><strong>${codeObj.code}</strong> <span class="badge ${statusClass}">${usedStatus}</span></div>
                <div>💵 Value: $${codeObj.value.toFixed(2)}</div>
                <div class="status">${codeObj.used ? `Redeemed at: ${codeObj.redeemedAt || '—'}` : 'Available'}</div>
            `;
            container.appendChild(div);
        });
    }

    // create redeem code
    function createRedeemCode(dollarValue, customCode = null) {
        if (isNaN(dollarValue) || dollarValue <= 0) {
            alert("Please enter a valid dollar amount > 0");
            return false;
        }
        let code = customCode && customCode.trim() !== "" ? customCode.trim().toUpperCase() : generateRandomCode();
        const existingCodes = getRedeemCodes();
        if (existingCodes.find(c => c.code === code)) {
            alert("Code already exists! Try different or leave blank for random.");
            return false;
        }
        const newCode = {
            code: code,
            value: parseFloat(dollarValue),
            used: false,
            createdAt: new Date().toISOString(),
            redeemedAt: null
        };
        existingCodes.push(newCode);
        saveRedeemCodes(existingCodes);
        renderCodeList();
        return true;
    }

    // admin authentication
    function checkAdmin() {
        const stored = sessionStorage.getItem("gulab_logged_user");
        if (!stored) {
            document.getElementById("adminAuthMsg").innerHTML = "❌ You are not logged in. <a href='index.html'>Login first</a>";
            return false;
        }
        const userData = JSON.parse(stored);
        const users = getUsers();
        const fullUser = users.find(u => u.username === userData.username);
        if (!fullUser || fullUser.isAdmin !== true) {
            document.getElementById("adminAuthMsg").innerHTML = "⛔ Access denied. Admin privileges required. <a href='hp.html'>Back to Dashboard</a>";
            return false;
        }
        // promote if needed: set flag in session? but we keep.
        document.getElementById("adminAuthMsg").innerHTML = "✅ Welcome, Admin. You can create redeem codes.";
        document.getElementById("adminContent").style.display = "block";
        renderCodeList();
        return true;
    }

    // make first admin if none exists (optional: if no admin, first user can become admin but we allow via manual trigger)
    function ensureAtLeastOneAdmin() {
        let users = getUsers();
        const anyAdmin = users.some(u => u.isAdmin === true);
        if (!anyAdmin && users.length > 0) {
            // set first user as admin for convenience (optional)
            users[0].isAdmin = true;
            saveUsers(users);
            console.log("First user promoted to admin.");
        } else if (users.length === 0) {
            // if no users, we can't auto promote but you can register first and then admin will be set later.
        }
    }

    // event handlers
    document.getElementById("createCodeBtn").onclick = () => {
        const value = parseFloat(document.getElementById("codeValue").value);
        const custom = document.getElementById("customCode").value;
        if (createRedeemCode(value, custom)) {
            alert("Redeem code created!");
            document.getElementById("codeValue").value = "";
            document.getElementById("customCode").value = "";
        }
    };

    document.getElementById("refreshListBtn").onclick = () => {
        renderCodeList();
    };

    ensureAtLeastOneAdmin();
    checkAdmin();
</script>
</body>
</html>
