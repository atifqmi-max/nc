<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulab Wallet - Login & Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            background: #fee;
            color: #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>
        <div class="form-container">
            <div id="login-form" class="form active">
                <h2>Welcome Back</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <input type="text" id="login-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div id="login-message" class="message"></div>
            </div>
            <div id="register-form" class="form">
                <h2>Create Account</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="reg-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-confirm" placeholder="Confirm Password" required>
                    </div>
                    <button type="submit">Register</button>
                </form>
                <div id="register-message" class="message"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            const users = JSON.parse(localStorage.getItem('gulab_users') || '{}');
            
            if (users[username] && users[username].password === password) {
                localStorage.setItem('gulab_current_user', username);
                window.location.href = 'index.html';
            } else {
                const msgDiv = document.getElementById('login-message');
                msgDiv.textContent = 'Invalid username or password';
                msgDiv.className = 'message error';
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            
            if (password !== confirm) {
                const msgDiv = document.getElementById('register-message');
                msgDiv.textContent = 'Passwords do not match';
                msgDiv.className = 'message error';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('gulab_users') || '{}');
            
            if (users[username]) {
                const msgDiv = document.getElementById('register-message');
                msgDiv.textContent = 'Username already exists';
                msgDiv.className = 'message error';
                return;
            }
            
            users[username] = {
                password: password,
                balance: 0,
                transactions: []
            };
            
            localStorage.setItem('gulab_users', JSON.stringify(users));
            
            const msgDiv = document.getElementById('register-message');
            msgDiv.textContent = 'Registration successful! Please login.';
            msgDiv.className = 'message success';
            
            setTimeout(() => switchTab('login'), 1500);
        }
    </script>
</body>
</html>
